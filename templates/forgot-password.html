<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NepXpress – Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}"/>
</head>
<body>

  <main class="right-panel" style="flex:1;">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">
            <span>{{ message }}</span>
            <button onclick="this.parentElement.style.display='none';">×</button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="login-card">
      <h1 class="login-heading">Reset Password</h1>
      <p class="login-sub">Enter your email and a new password</p>

      <form method="POST" action="{{ url_for('forgot_password') }}">
        <div class="field">
          <label class="field-label" for="email">Email Address</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email"/>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="new_password">New Password</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="new_password" name="new_password" placeholder="Min 6 characters" required autocomplete="new-password"/>
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="confirm_password">Confirm New Password</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter new password" required autocomplete="new-password"/>
          </div>
        </div>

        <button type="submit" class="btn-primary">Reset Password</button>
        <p class="register-link">Remembered it? <a href="{{ url_for('auth.login') }}">Back to login</a></p>
      </form>
    </div>
  </main>

  <button class="help-btn">?</button>
</body>
</html>
